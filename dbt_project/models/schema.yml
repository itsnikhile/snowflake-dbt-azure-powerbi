version: 2

sources:
  - name: raw
    database: ANALYTICS
    schema: RAW
    tables:
      - name: sales
        description: "Raw sales transactions from Azure Blob Storage"
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: _ingested_at
        columns:
          - name: sale_id
            description: "Unique sale identifier"
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: total_amount
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 10000000
      - name: customers
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: email
            tests: [not_null]
      - name: products
        columns:
          - name: product_id
            tests: [not_null, unique]
      - name: territories
        columns:
          - name: territory_id
            tests: [not_null, unique]
      - name: budget
        columns:
          - name: budget_id
            tests: [not_null, unique]

models:
  - name: stg_sales
    description: "Cleaned and validated sales transactions — Silver layer"
    config:
      tags: [staging, sales]
    columns:
      - name: sale_id
        tests: [not_null, unique]
      - name: net_revenue
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: discount_pct
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'pending', 'shipped', 'cancelled', 'returned']

  - name: stg_customers
    description: "Cleaned customer records — Silver layer"
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: email
        tests: [not_null]

  - name: fct_sales
    description: "Central sales fact table with full dimensional context — Gold layer"
    config:
      tags: [marts, powerbi]
    columns:
      - name: sale_id
        tests: [not_null, unique]
      - name: net_revenue
        tests: [not_null]
      - name: gross_profit
        description: "Net revenue minus total cost"
      - name: gross_margin_pct
        tests:
          - dbt_utils.accepted_range:
              min_value: -100
              max_value: 100

  - name: dim_customers
    description: "Enriched customer dimension with RFM segmentation — Gold layer"
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: customer_segment
        tests:
          - accepted_values:
              values:
                - Champions
                - Loyal Customers
                - Recent Customers
                - Potential Loyalists
                - At Risk
                - Lost
                - Needs Attention
      - name: lifetime_tier
        tests:
          - accepted_values:
              values: [Platinum, Gold, Silver, Bronze]

  - name: fct_sales_performance
    description: "Pre-aggregated monthly KPIs for Power BI performance"
    columns:
      - name: total_revenue
        tests: [not_null]
      - name: order_count
        tests: [not_null]
