  <text x="830" y="133" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">DirectQuery ready</text>

  <!-- Arrow -->
  <line x1="900" y1="112" x2="938" y2="112" stroke="#55efc4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Power BI -->
  <rect x="940" y="65" width="220" height="100" rx="6" fill="#F2C811" fill-opacity="0.12" stroke="#F2C811" stroke-width="2"/>
  <text x="1050" y="90" font-family="monospace" font-size="11" fill="#F2C811" text-anchor="middle" font-weight="bold">POWER BI</text>
  <text x="1050" y="108" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">Semantic Model</text>
  <text x="1050" y="123" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">20+ DAX Measures</text>
  <text x="1050" y="138" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">Row-Level Security</text>
  <text x="1050" y="153" font-family="monospace" font-size="10" fill="#F2C811" text-anchor="middle">DirectQuery</text>

  <!-- Stats bar -->
  <rect x="40" y="258" width="1120" height="40" rx="4" fill="#000000" fill-opacity="0.3" stroke="#29B5E8" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="150" y="283" font-family="monospace" font-size="11" fill="#29B5E8" text-anchor="middle">❄ Snowflake DWH</text>
  <text x="320" y="283" font-family="monospace" font-size="11" fill="#FF694B" text-anchor="middle">🔄 dbt 12 Models</text>
  <text x="490" y="283" font-family="monospace" font-size="11" fill="#0078D4" text-anchor="middle">☁ Azure ADF</text>
  <text x="660" y="283" font-family="monospace" font-size="11" fill="#FFD700" text-anchor="middle">📊 20+ DAX Measures</text>
  <text x="840" y="283" font-family="monospace" font-size="11" fill="#55efc4" text-anchor="middle">🔒 Row-Level Security</text>
  <text x="1020" y="283" font-family="monospace" font-size="11" fill="#F2C811" text-anchor="middle">⚡ p99 &lt;3s Queries</text>
