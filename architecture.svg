<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#29B5E8"/>
    </marker>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <!-- grid -->
  <pattern id="grid" width="60" height="40" patternUnits="userSpaceOnUse">
    <circle cx="30" cy="20" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <!-- top bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#29B5E8"/>
