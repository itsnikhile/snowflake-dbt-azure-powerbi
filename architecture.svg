  <rect x="400" y="80" width="140" height="65" rx="6" fill="#FF694B" fill-opacity="0.12" stroke="#FF694B" stroke-width="2"/>
  <text x="470" y="106" font-family="monospace" font-size="11" fill="#FF694B" text-anchor="middle" font-weight="bold">dbt STAGING</text>
  <text x="470" y="122" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">Silver Layer</text>
  <text x="470" y="136" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">stg_sales ✓ tests</text>

