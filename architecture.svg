  <text x="650" y="136" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">fct_sales + RFM</text>

  <!-- Arrow -->
  <line x1="720" y1="112" x2="758" y2="112" stroke="#FFD700" stroke-width="2" marker-end="url(#arr)"/>

