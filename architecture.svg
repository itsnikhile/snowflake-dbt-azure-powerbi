  <text x="110" y="200" font-family="monospace" font-size="11" fill="#0078D4" text-anchor="middle">AZURE DATA</text>
  <text x="110" y="216" font-family="monospace" font-size="11" fill="#0078D4" text-anchor="middle">FACTORY</text>

  <!-- Arrow -->
  <line x1="180" y1="112" x2="218" y2="112" stroke="#29B5E8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Snowflake RAW -->
  <rect x="220" y="80" width="140" height="65" rx="6" fill="#29B5E8" fill-opacity="0.12" stroke="#29B5E8" stroke-width="2"/>
  <text x="290" y="106" font-family="monospace" font-size="11" fill="#29B5E8" text-anchor="middle" font-weight="bold">SNOWFLAKE</text>
  <text x="290" y="122" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">RAW Schema</text>
  <text x="290" y="136" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">Bronze Layer</text>

