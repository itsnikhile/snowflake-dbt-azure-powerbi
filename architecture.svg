  <!-- title -->
  <text x="600" y="32" font-family="monospace" font-size="14" font-weight="bold" fill="#29B5E8" text-anchor="middle">ENTERPRISE ANALYTICS PIPELINE — Snowflake + dbt + Azure + Power BI</text>

  <!-- Layer 1: Azure Blob -->
  <rect x="40" y="80" width="140" height="65" rx="6" fill="#0078D4" fill-opacity="0.12" stroke="#0078D4" stroke-width="2"/>
  <text x="110" y="106" font-family="monospace" font-size="11" fill="#0078D4" text-anchor="middle" font-weight="bold">AZURE BLOB</text>
  <text x="110" y="122" font-family="monospace" font-size="10" fill="#7b7a99" text-anchor="middle">Raw Parquet</text>
